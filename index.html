        * {

            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {

            padding: 15px;

            align-items: center;

        :root {

        }

        /* Top Header UI Elements */
        .header {

            max-width: 1000px;
        }

        .logo {

        }

            color: var(--primary-blue);

            text-align: center;
            flex: 1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .stat-icon {

            width: 100%;

            margin-bottom: 30px;

        .class-item p {
